<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CateControl{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0f6be4;
            --primary-dark: #0856bb;
            --primary-light: #006eff;
            --accent: #22D9A0;
            --accent-red: #FF6B6B;
            --accent-yellow: #FFD166;
            --bg: #f5f7fb;
            --surface: #FFFFFF;
            --border: #e2e8f0;
            --text: #1e293b;
            --text-muted: #94a3b8;
            --shadow: 0 1px 8px rgba(15,23,42,0.08);
            --shadow-lg: 0 4px 24px rgba(15,23,42,0.12);
            --radius: 14px;
            --radius-sm: 8px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Josefin Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .mono { font-family: 'Courier New', monospace; }

        /* ── Sidebar ── */
        .sidebar {
            position: fixed;
            left: 0; top: 0; bottom: 0;
            width: 230px;
            background: var(--primary-light);
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .sidebar-brand {
            padding: 22px 18px;
            border-bottom: 1px solid rgba(255,255,255,0.12);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-brand .brand-icon {
            width: 36px; height: 36px;
            background: rgba(255,255,255,0.18);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
        }

        .sidebar-brand h1 {
            color: white;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .sidebar-brand p {
            color: rgba(255,255,255,0.55);
            font-size: 10px;
            margin-top: 2px;
            line-height: 1.3;
        }

        .sidebar-nav {
            flex: 1;
            padding: 14px 10px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 11px 12px;
            border-radius: var(--radius-sm);
            color: rgba(255,255,255,0.65);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.15s;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(255,255,255,0.14);
            color: white;
        }

        .nav-item .nav-icon {
            width: 18px;
            text-align: center;
            font-size: 14px;
            opacity: 0.8;
        }

        .sidebar-footer {
            padding: 14px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .admin-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .admin-avatar {
            width: 32px; height: 32px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; color: white;
        }

        .admin-info .admin-name { color: white; font-size: 12px; font-weight: 600; }
        .admin-info .admin-role { color: rgba(255,255,255,0.5); font-size: 10px; display: block; }

        .logout-btn {
            margin-left: auto;
            background: none; border: none;
            color: rgba(255,255,255,0.45);
            cursor: pointer; font-size: 16px;
            transition: color 0.15s; padding: 4px;
            border-radius: 4px;
        }
        .logout-btn:hover { color: white; background: rgba(255,255,255,0.1); }

        /* ── Main ── */
        .main-content {
            margin-left: 230px;
            padding: 30px;
            min-height: 100vh;
        }

        .page-header { margin-bottom: 24px; }

        .page-header h2 {
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: 0.3px;
        }

        .page-header p {
            color: var(--text-muted);
            font-size: 13px;
            margin-top: 3px;
        }

        /* ── Cards ── */
        .card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 22px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .stat-cards {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            margin-bottom: 22px;
        }

        .stat-card {
            background: var(--surface);
            padding: 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .stat-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .stat-icon {
            width: 38px; height: 38px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 17px;
        }

        .stat-badge {
            padding: 2px 9px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.3px;
        }

        .badge-green { background: #ecfdf5; color: #16a34a; }
        .badge-blue  { background: #eff6ff; color: #2563eb; }
        .badge-orange{ background: #fff7ed; color: #c2410c; }

        .stat-label { font-size: 12px; color: var(--text-muted); font-weight: 500; }
        .stat-value { font-size: 30px; font-weight: 700; color: var(--text); line-height: 1; }

        /* ── Buttons ── */
        .btn {
            padding: 9px 18px;
            border-radius: var(--radius-sm);
            font-family: 'Josefin Sans', sans-serif;
            font-size: 13px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            letter-spacing: 0.2px;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); }

        .btn-outline {
            background: transparent;
            color: var(--primary);
            border: 1.5px solid var(--primary);
        }
        .btn-outline:hover { background: var(--primary); color: white; }

        .btn-danger { background: #dc2626; color: white; }
        .btn-danger:hover { background: #b91c1c; }

        .btn-sm { padding: 6px 12px; font-size: 12px; }

        .btn-success { background: var(--accent); color: #064e3b; }

        /* ── Forms ── */
        .form-group { margin-bottom: 14px; }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 13px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: 'Josefin Sans', sans-serif;
            font-size: 13px;
            color: var(--text);
            background: var(--surface);
            transition: border-color 0.15s;
            outline: none;
        }

        .form-group input:focus,
        .form-group select:focus { border-color: var(--primary); }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        /* ── Table ── */
        .table-wrap { overflow-x: auto; }

        table { width: 100%; border-collapse: collapse; }

        th {
            padding: 10px 14px;
            text-align: left;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.6px;
            border-bottom: 1.5px solid var(--border);
        }

        td {
            padding: 13px 14px;
            font-size: 13px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }

        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f8fafc; }

        /* ── Badges ── */
        .badge {
            padding: 3px 9px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            display: inline-block;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .badge-entrada   { background: #ecfdf5; color: #16a34a; }
        .badge-saida     { background: #fef2f2; color: #dc2626; }
        .badge-catequizando { background: #fff7ed; color: #c2410c; }
        .badge-adulto    { background: #f5f3ff; color: #6d28d9; }
        .badge-responsavel { background: #eff6ff; color: #1d4ed8; }

        /* ── Modal ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15,23,42,0.45);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.open { display: flex; }

        .modal {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 28px;
            width: 500px;
            max-width: 95vw;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.25s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(16px); opacity: 0; }
            to   { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .modal-header h3 { font-size: 17px; font-weight: 700; }

        .modal-close {
            background: none; border: none;
            font-size: 20px; cursor: pointer;
            color: var(--text-muted);
            line-height: 1; padding: 2px 6px;
            border-radius: 4px; transition: background 0.15s;
        }
        .modal-close:hover { background: #f1f5f9; }

        /* ── Toast ── */
        .toast-container {
            position: fixed;
            top: 20px; right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .toast {
            padding: 12px 18px;
            border-radius: var(--radius-sm);
            background: var(--text);
            color: white;
            font-size: 13px;
            font-weight: 500;
            box-shadow: var(--shadow-lg);
            animation: slideIn 0.25s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 260px;
        }

        .toast.success { background: #16a34a; }
        .toast.error   { background: #dc2626; }
        .toast.info    { background: var(--primary); }

        @keyframes slideIn {
            from { transform: translateX(32px); opacity: 0; }
            to   { transform: translateX(0); opacity: 1; }
        }

        /* ── Search ── */
        .search-bar { position: relative; }

        .search-bar input { padding-left: 36px; }

        .search-bar .search-icon {
            position: absolute;
            left: 11px; top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 14px;
            pointer-events: none;
        }

        /* ── Utility ── */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
        .flex { display: flex; }
        .items-center { align-items: center; }
        .gap-2 { gap: 8px; }
        .gap-3 { gap: 12px; }
        .justify-between { justify-content: space-between; }
        .mb-4 { margin-bottom: 16px; }
        .mb-6 { margin-bottom: 22px; }
        .text-muted { color: var(--text-muted); font-size: 13px; }

        .empty-state {
            text-align: center;
            padding: 48px;
            color: var(--text-muted);
        }

        @media (max-width: 900px) {
            .sidebar { width: 200px; }
            .main-content { margin-left: 200px; padding: 18px; }
            .stat-cards { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
    {% block head %}{% endblock %}
</head>

<body>
    {% block body %}{% endblock %}

    <div class="toast-container" id="toastContainer"></div>

    <script>
        function showToast(message, type = 'info', duration = 3500) {
            const container = document.getElementById('toastContainer');
            const icons = { success: '✓', error: '✕', info: 'i' };
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<span style="font-weight:800;font-size:14px">${icons[type]}</span> ${message}`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), duration);
        }

        async function api(path, options = {}) {
            const res = await fetch(path, {
                headers: { 'Content-Type': 'application/json' },
                ...options
            });
            return res.json();
        }
    </script>
    {% block scripts %}{% endblock %}
</body>

</html>
