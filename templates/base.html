<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CateControl{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4F35D2;
            --primary-dark: #3B27A8;
            --primary-light: #7C5FF5;
            --accent: #22D9A0;
            --accent-warm: #FF6B6B;
            --accent-yellow: #FFD166;
            --bg: #F8F7FF;
            --surface: #FFFFFF;
            --surface2: #F0EDFF;
            --border: #E4DFFF;
            --text: #1A1535;
            --text-muted: #6B6490;
            --shadow: 0 4px 24px rgba(79,53,210,0.10);
            --shadow-lg: 0 8px 40px rgba(79,53,210,0.18);
            --radius: 16px;
            --radius-sm: 10px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Sora', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        .mono { font-family: 'JetBrains Mono', monospace; }

        /* Sidebar */
        .sidebar {
            position: fixed; left: 0; top: 0; bottom: 0;
            width: 240px;
            background: var(--primary);
            display: flex; flex-direction: column;
            padding: 0;
            z-index: 100;
        }
        .sidebar-brand {
            padding: 24px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; gap: 12px;
        }
        .sidebar-brand .icon {
            width: 40px; height: 40px;
            background: rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
        }
        .sidebar-brand h1 { color: white; font-size: 16px; font-weight: 700; }
        .sidebar-brand p { color: rgba(255,255,255,0.6); font-size: 11px; }
        .sidebar-nav { flex: 1; padding: 16px 12px; display: flex; flex-direction: column; gap: 4px; }
        .nav-item {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 14px;
            border-radius: var(--radius-sm);
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            font-size: 14px; font-weight: 500;
            transition: all 0.2s;
            cursor: pointer;
        }
        .nav-item:hover, .nav-item.active {
            background: rgba(255,255,255,0.15);
            color: white;
        }
        .nav-item .nav-icon { font-size: 18px; width: 20px; text-align: center; }
        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .admin-info {
            display: flex; align-items: center; gap: 10px;
        }
        .admin-avatar {
            width: 36px; height: 36px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; color: white;
        }
        .admin-info span { color: white; font-size: 13px; font-weight: 600; }
        .admin-info small { color: rgba(255,255,255,0.5); font-size: 11px; display: block; }
        .logout-btn {
            margin-left: auto;
            background: none; border: none;
            color: rgba(255,255,255,0.5);
            cursor: pointer; font-size: 18px;
            transition: color 0.2s;
        }
        .logout-btn:hover { color: white; }

        /* Main */
        .main-content {
            margin-left: 240px;
            padding: 32px;
            min-height: 100vh;
        }
        .page-header {
            margin-bottom: 28px;
        }
        .page-header h2 { font-size: 26px; font-weight: 700; color: var(--text); }
        .page-header p { color: var(--text-muted); font-size: 14px; margin-top: 4px; }

        /* Cards */
        .card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        .stat-cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
        .stat-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            display: flex; flex-direction: column; gap: 8px;
        }
        .stat-top { display: flex; align-items: center; justify-content: space-between; }
        .stat-icon {
            width: 42px; height: 42px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
        }
        .stat-badge {
            padding: 3px 10px; border-radius: 20px;
            font-size: 11px; font-weight: 700;
        }
        .badge-green { background: #E8FFF5; color: #22D9A0; }
        .badge-blue { background: #EEF2FF; color: #4F35D2; }
        .badge-orange { background: #FFF3E0; color: #FF9800; }
        .stat-label { font-size: 13px; color: var(--text-muted); }
        .stat-value { font-size: 32px; font-weight: 700; color: var(--text); line-height: 1; }

        /* Buttons */
        .btn {
            padding: 10px 20px; border-radius: var(--radius-sm);
            font-family: 'Sora', sans-serif; font-size: 14px; font-weight: 600;
            border: none; cursor: pointer; transition: all 0.2s;
            display: inline-flex; align-items: center; gap: 8px;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }
        .btn-outline { background: transparent; color: var(--primary); border: 2px solid var(--primary); }
        .btn-outline:hover { background: var(--primary); color: white; }
        .btn-danger { background: var(--accent-warm); color: white; }
        .btn-danger:hover { background: #e55; }
        .btn-sm { padding: 7px 14px; font-size: 12px; }
        .btn-success { background: var(--accent); color: #0a2e22; }

        /* Forms */
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 11px 14px;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: 'Sora', sans-serif; font-size: 14px;
            color: var(--text); background: var(--surface);
            transition: border-color 0.2s;
            outline: none;
        }
        .form-group input:focus, .form-group select:focus { border-color: var(--primary); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

        /* Table */
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { padding: 12px 16px; text-align: left; font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 2px solid var(--border); }
        td { padding: 14px 16px; font-size: 14px; border-bottom: 1px solid var(--border); }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: var(--surface2); }

        /* Badges */
        .badge {
            padding: 4px 10px; border-radius: 20px;
            font-size: 11px; font-weight: 700;
            display: inline-block;
        }
        .badge-entrada { background: #E8FFF5; color: #16a34a; }
        .badge-saida { background: #FFF0F0; color: #dc2626; }
        .badge-crianca { background: #EEF2FF; color: var(--primary); }
        .badge-responsavel { background: #FFF3E0; color: #d97706; }

        /* Modal */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(26,21,53,0.5);
            z-index: 1000; align-items: center; justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 32px;
            width: 500px; max-width: 95vw;
            max-height: 90vh; overflow-y: auto;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
        .modal-header h3 { font-size: 18px; font-weight: 700; }
        .modal-close { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--text-muted); }

        /* Toast */
        .toast-container { position: fixed; top: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
        .toast {
            padding: 14px 20px; border-radius: var(--radius-sm);
            background: var(--text); color: white;
            font-size: 14px; font-weight: 500;
            box-shadow: var(--shadow-lg);
            animation: slideIn 0.3s ease;
            display: flex; align-items: center; gap: 10px;
            min-width: 280px;
        }
        .toast.success { background: #16a34a; }
        .toast.error { background: #dc2626; }
        .toast.info { background: var(--primary); }
        @keyframes slideIn {
            from { transform: translateX(40px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Misc */
        .search-bar { position: relative; }
        .search-bar input { padding-left: 38px; }
        .search-bar .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .flex { display: flex; }
        .items-center { align-items: center; }
        .gap-2 { gap: 8px; }
        .gap-3 { gap: 12px; }
        .justify-between { justify-content: space-between; }
        .mb-4 { margin-bottom: 16px; }
        .mb-6 { margin-bottom: 24px; }
        .text-muted { color: var(--text-muted); font-size: 13px; }
        .empty-state { text-align: center; padding: 48px; color: var(--text-muted); }
        .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }

        @media (max-width: 900px) {
            .sidebar { width: 200px; }
            .main-content { margin-left: 200px; padding: 20px; }
            .stat-cards { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
{% block body %}{% endblock %}

<div class="toast-container" id="toastContainer"></div>

<script>
function showToast(message, type = 'info', duration = 3500) {
    const container = document.getElementById('toastContainer');
    const icons = { success: '✅', error: '❌', info: 'ℹ️' };
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.innerHTML = `<span>${icons[type]}</span> ${message}`;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), duration);
}

async function api(path, options = {}) {
    const res = await fetch(path, {
        headers: { 'Content-Type': 'application/json' },
        ...options
    });
    return res.json();
}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
